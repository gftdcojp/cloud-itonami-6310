name: ci

# NOTE: the gftdcojp org currently DISABLES GitHub Actions org-wide, so this
# workflow does not execute here yet. It is kept correct and ready: it runs
# verbatim once the org enables Actions, or if this project is mirrored under
# an Actions-enabled org. Until then the gates run locally / in the west
# superproject: `clojure -M:lint` and `clojure -M:dev:test`.
#
# This project is a west project in the com-junkawasaki/root superproject; its
# deps reference sibling repos via :local/root
# (../../com-junkawasaki/langgraph-clj, .../langchain-clj). Those two are
# PUBLIC, so the test job reconstructs the workspace layout by checking them
# out into the expected relative paths — no token needed.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: clj-kondo (errors fail the build)
        run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      # lay the west workspace out so ../../com-junkawasaki/* resolves
      - uses: actions/checkout@v4
        with: { path: orgs/gftdcojp/gftd-talent-actor }
      - uses: actions/checkout@v4
        with:
          repository: com-junkawasaki/langgraph-clj
          path: orgs/com-junkawasaki/langgraph-clj
      - uses: actions/checkout@v4
        with:
          repository: com-junkawasaki/langchain-clj
          path: orgs/com-junkawasaki/langchain-clj
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: test (policy contract · store parity · LLM advisor · phases · facts)
        working-directory: orgs/gftdcojp/gftd-talent-actor
        run: clojure -M:dev:test
